name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  CONTAINER_IMAGE_REPOSITORY: ${{ vars.CONTAINER_IMAGE_REPOSITORY }}
  CONTAINER_IMAGE_LATEST: ${{ vars.CONTAINER_IMAGE_REPOSITORY }}:latest
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Build application
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Run Lighthouse CI
        run: pnpm lhci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports
          if-no-files-found: warn
          retention-days: 14

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.CONTAINER_IMAGE_LATEST }}
            ${{ env.CONTAINER_IMAGE_REPOSITORY }}:${{ github.sha }}

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy Compose file to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_TARGET_PATH: ${{ secrets.DEPLOY_TARGET_PATH }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USERNAME@$DEPLOY_HOST" "mkdir -p \"$DEPLOY_TARGET_PATH\""
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml "$DEPLOY_USERNAME@$DEPLOY_HOST:$DEPLOY_TARGET_PATH/docker-compose.prod.yml"

      - name: Write deployment environment file
        env:
          APP_NETWORK_NAME: ${{ vars.APP_NETWORK_NAME }}
          CONTAINER_IMAGE: ${{ env.CONTAINER_IMAGE_LATEST }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_TARGET_PATH: ${{ secrets.DEPLOY_TARGET_PATH }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USERNAME@$DEPLOY_HOST" "printf 'APP_NETWORK_NAME=%s\nCONTAINER_IMAGE=%s\n' '$APP_NETWORK_NAME' '$CONTAINER_IMAGE' > \"$DEPLOY_TARGET_PATH/.env.production\""

      - name: Pull image and restart application
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_TARGET_PATH: ${{ secrets.DEPLOY_TARGET_PATH }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          REGISTRY_HOST: ${{ env.REGISTRY_HOST }}
          REGISTRY_READ_TOKEN: ${{ secrets.REGISTRY_READ_TOKEN }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        run: |
          printf '%s\n' "$REGISTRY_READ_TOKEN" | ssh -i ~/.ssh/deploy_key "$DEPLOY_USERNAME@$DEPLOY_HOST" "docker login $REGISTRY_HOST -u $REGISTRY_USERNAME --password-stdin && cd \"$DEPLOY_TARGET_PATH\" && docker compose --env-file .env.production -f docker-compose.prod.yml pull && docker compose --env-file .env.production -f docker-compose.prod.yml up -d && docker image prune -f"
